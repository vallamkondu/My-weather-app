name: Build and deploy docker image in k8s
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_helm:
        description: "Run Helm Deployment?"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.set-image-tag.outputs.IMAGE_TAG }}  # Expose IMAGE_TAG to next job

    steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set IMAGE_TAG
      id: set-image-tag
      run: |
        IMAGE_TAG=$(date +%s)
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${{ env.IMAGE_TAG }} .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${{ env.IMAGE_TAG }}

    - name: Display IMAGE_TAG
      run: echo "IMAGE_TAG=${{ env.IMAGE_TAG }}"

  packer_build:
    runs-on: ubuntu-latest
    outputs:
      AMI_ID: ${{ steps.build-packer.outputs.AMI_ID }}  #Exposing AMI_ID to next job
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Initialize Packer
        working-directory: ./packer
        run: |
          pwd
          packer init .
          packer plugins installed
      
      - name: Validate Packer Template
        working-directory: ./packer
        run: packer validate .
  
      - name: Format Packer Files
        working-directory: ./packer
        run: packer fmt .
  
      - name: Build Packer Image
        id: build-packer
        working-directory: ./packer
        run: |
          PACKER_OUTPUT=$(packer build -machine-readable -var-file=variables.pkrvars.hcl .)
          AMI_ID=$(echo "$PACKER_OUTPUT" | grep "artifact,0,id" | cut -d ',' -f6)
          echo "AMI_ID=$AMI_ID" >> $GITHUB_ENV
          echo "AMI_ID=$AMI_ID" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1

  terraform_deploy:
    needs: packer_build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Initialize Terraform
        working-directory: ./terraform
        run: terraform init

      - name: Terraform plan
        working-directory: ./terraform
        run: terraform plan -var "ami_id=${{ needs.packer_build.outputs.AMI_ID }}"

      - name: Apply Terraform
        working-directory: ./terraform
        run: |
          terraform apply -auto-approve -var "ami_id=${{ needs.packer_build.outputs.AMI_ID }}"
          terraform destroy --auto-approve
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-north-1

  Deploy-Helm:
    if: inputs.deploy_helm == 'yes'  # Run only if deploy_helm is 'yes'
    needs: build-and-push
    runs-on: self-hosted  # Uses self-hosted runner
    steps:
      - name: Display IMAGE_TAG
        run: |
          echo "Deploying with IMAGE_TAG=${{ needs.build-and-push.outputs.IMAGE_TAG }}"

      - name: run unittest
        run: helm unittest charts/weather-app
        
      - name: Deploy Helm Chart
        shell: cmd
        run: |
          helm upgrade --install weather-app charts/weather-app --set image.repository=${{ secrets.DOCKERHUB_USERNAME }}/weather-app --set image.tag="${{ needs.build-and-push.outputs.IMAGE_TAG }}"
          kubectl get pods
          sleep 50
          kubectl get pods



