name: Build and deploy docker image in k8s

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
jobs:
  build-and-push:
    name: build and push Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
        
    - name: Build and push the Docker image
      run: |
        IMAGE_TAG=$(date +%s)
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${IMAGE_TAG} .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${IMAGE_TAG}
    
  Deploy-Helm:
    needs: build-and-push
    runs-on: self-hosted  # Uses self-hosted runner
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Checks out the repository

      - name: Switch directory and run unitest
        run: |
          helm unittest charts/weather-app

      - name: Deploy and Delete Helm Chart
        shell: cmd
        run: |
          helm upgrade --install weather-app charts/weather-app --set image.repository=${{ secrets.DOCKER_USERNAME }}/weather-app --set image.tag=$IMAGE_TAG
          kubectl get pods
          sleep 200
          kubectl get pods
