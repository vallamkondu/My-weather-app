name: Build and deploy docker image in k8s

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_helm:
        description: "Run Helm Deployment?"
        required: true
        default: "yes"
        type: choice
        options:
          - "yes"
          - "no"

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.set-image-tag.outputs.IMAGE_TAG }}  # Expose IMAGE_TAG to next job

    steps:
    - name: Code checkout
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set IMAGE_TAG
      id: set-image-tag
      run: |
        IMAGE_TAG=$(date +%s)
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

    - name: Build and Push Docker Image
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${{ env.IMAGE_TAG }} .
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/weather-app:${{ env.IMAGE_TAG }}

    - name: Display IMAGE_TAG
      run: echo "IMAGE_TAG=${{ env.IMAGE_TAG }}"

  packer_build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install Packer
        uses: hashicorp/setup-packer@main
        with:
          version: latest

      - name: Initialize Packer
        working-directory: ./packer
        run: |
          pwd
          packer init .
          packer plugins installed
      
      - name: Validate Packer Template
        working-directory: ./packer
        run: packer validate .
  
      - name: Format Packer Files
        working-directory: ./packer
        run: packer fmt .
  
      - name: Build Packer Image
        working-directory: ./packer
        run: packer build -var-file=variables.pkrvars.hcl .
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
      



  Deploy-Helm:
    if: inputs.deploy_helm == 'yes'  # Run only if deploy_helm is 'yes'
    needs: build-and-push
    runs-on: self-hosted  # Uses self-hosted runner
    steps:
      - name: Display IMAGE_TAG
        run: |
          echo "Deploying with IMAGE_TAG=${{ needs.build-and-push.outputs.IMAGE_TAG }}"
          

      - name: Switch directory and run unit test
        run: helm unittest charts/weather-app
        # this is for testing


